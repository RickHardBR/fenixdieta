<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Fênix 54</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <div class="container">
    <div class="titulo-app">
      <h1>Projeto Fênix 54</h1>
      <button onclick="toggleFullscreen()" id="btnFullscreen" class="btn-fullscreen" title="Tela cheia">⛶</button>
    </div>
    <section class="card">
      <h2>Histórico Completo de Peso</h2>
      <div id="resumoPeso"></div>
      <canvas id="graficoPeso"></canvas>
      <div id="historicoCompleto"></div>
      <button onclick="voltar()">Voltar</button>
    </section>
  </div>


<!-- Modal de Confirmação de Exclusão -->
<div id="modalConfirmacao" style="display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.75); align-items:center; justify-content:center;">
  <div style="background:#222; border-radius:16px; padding:24px; width:88%; max-width:360px; box-shadow:0 5px 30px rgba(0,0,0,0.5);">
    <p id="modalConfirmacaoTexto" style="text-align:center; font-size:15px; color:#ddd; margin-bottom:24px; line-height:1.5;"></p>
    <div style="display:flex; gap:12px;">
      <button onclick="fecharModalConfirmacao()" style="flex:1; background:#444; color:#fff;">Cancelar</button>
      <button id="btnConfirmarExclusao" style="flex:1; background:#ff5252; color:#fff;">Excluir</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./js/fullscreen.js"></script>
<script src="./js/historico.js"></script>

</body>
</html>
