<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Refeições - Projeto Fênix 54</title>
  <link rel="stylesheet" href="./style/style.css">
</head>

<body>

  <div class="container">

    <div class="titulo-app">
      <h1>Projeto Fênix 54</h1>
      <button onclick="toggleFullscreen()" id="btnFullscreen" class="btn-fullscreen" title="Tela cheia">⛶</button>
    </div>

    <section class="card">
      <h2>Histórico de Refeições</h2>

      <!-- Seletor de mês -->
      <div class="navegacao-dia" style="margin-bottom: 12px;">
        <button onclick="mesAnterior()" class="navegacao_dias">⬅️</button>
        <span id="labelMes" style="font-weight:600; font-size:15px; text-align:center;"></span>
        <button id="btnProximoMes" onclick="proximoMes()" class="navegacao_dias">➡️</button>
      </div>

      <!-- Área scrollável com altura adaptada à tela -->
      <div class="historico-scroll">
        <div id="historicoRefeicoes"></div>
      </div>

      <button onclick="voltar()">Voltar</button>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/fullscreen.js"></script>
  <script src="./js/historico.js"></script>

</body>
</html>
