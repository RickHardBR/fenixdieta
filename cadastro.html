<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - Fênix 54</title>

  <link rel="stylesheet" href="./style/login.css">
</head>

<body>

<div class="container">

  <div class="card">

    <div class="logo">
      <img src="./img/fenix.png" alt="Logo Fênix 54">
    </div>

    <h2>Criar conta</h2>

    <input id="nome" type="text" placeholder="Nome completo">

    <input id="email" type="email" placeholder="E-mail">

    <input id="telefone" type="tel" placeholder="Telefone (opcional)">

    <div class="campo-senha">
      <input id="senha" type="password" placeholder="Senha">

      <button type="button" onclick="toggleSenha()" class="btn-senha">
        👁
      </button>
    </div>

    <div class="campo-senha">
      <input id="confirmarSenha" type="password" placeholder="Confirmar senha">
    </div>

    <button onclick="criarConta()">Criar conta</button>

    <button class="secondary" onclick="voltarLogin()">Voltar</button>

    <p id="mensagem"></p>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./js/supabase.js"></script>
<script src="./js/cadastro.js"></script>

</body>
</html>
