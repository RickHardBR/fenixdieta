<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./img/favicon_dieta_calorias.ico" type="image/x-icon">
  <title>Projeto Fênix 54</title>
  <link rel="stylesheet" href="./style/style.css">
</head>

<body>

  <div class="container">
    <h1>Projeto Fênix54</h1>

    <section class="card">
      <h2>Perfil</h2>
      <label>Peso Atual (kg)</label>
      <input type="number" id="peso" placeholder="???kg">
      <button onclick="salvarPeso()">Salvar Peso</button>
    </section>
    <section class="card">
      <h2>Histórico de Peso</h2>
      <div id="historicoPeso"></div>
      <button onclick="irParaHistorico()">Ver histórico completo</button>
    </section>
    <section class="card">
      <div class="navegacao-dia">
        <button onclick="alterarDia(-1)" class="navegacao_dias">⬅️</button>
        <h2 id="tituloRefeicoes"></h2>
        <button onclick="alterarDia(1)" class="navegacao_dias">➡️</button>
      </div>

      <button onclick="voltarParaHoje()" class="btn-voltar-hoje">
        🔄 Dia atual
      </button>
      <div class="calorias-widget">

        <div class="calorias-circulo">

          <div class="calorias-centro">
            <span id="caloriasNumero">0</span>
            <small>kcal</small>
          </div>

        </div>

        <div class="calorias-info">
          Meta diária: <span id="metaCalorias">1900</span> kcal
        </div>

      </div>
      <div id="refeicoes"></div>
      <button onclick="irParaHistoricoRefeicoes()">
        Histórico de Refeições
      </button>
      <button onclick="encerrarDia()" class="btn-encerrar-dia">Encerrar Dia</button>
    </section>

    <section class="card">
      <h2>Status do Dia</h2>
      <p id="status"></p>
    </section>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase.js"></script>
  <script src="./js/planosemanal.js"></script>
  <script src="./js/app.js"></script>
</body>
